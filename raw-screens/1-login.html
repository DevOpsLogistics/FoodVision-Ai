<!-- Subtle atmospheric effect -->
<div class="pointer-events-none fixed inset-0 z-0 opacity-20 transition-opacity duration-500" id="glow-pointer" style="background: radial-gradient(600px circle at var(--x, 0px) var(--y, 0px), rgba(215, 236, 149, 0.4), transparent 40%);"></div>
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('glow-pointer');
            glow.style.setProperty('--x', e.clientX + 'px');
            glow.style.setProperty('--y', e.clientY + 'px');
        });

        // Input interactions
        const inputs = document.querySelectorAll('.editorial-input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-secondary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-secondary');
            });
        });
    </script>
