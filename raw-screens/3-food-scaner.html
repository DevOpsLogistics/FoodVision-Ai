<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .scanning-line {
            height: 1.5px;
            background: #8A9A5B;
            box-shadow: 0 0 15px rgba(138, 154, 91, 0.5);
            width: 100%;
            position: absolute;
            top: 50%;
            animation: scan 4s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-120px); opacity: 0; }
            20%, 80% { opacity: 1; }
            50% { transform: translateY(120px); }
        }
        body {
            background-color: #FAF9F6;
            color: #1b1c1c;
            overflow-x: hidden;
        }
    </style>

<script>
        // Micro-interaction for scanning effect
        document.addEventListener('DOMContentLoaded', () => {
            const shutterBtn = document.querySelector('button .material-symbols-outlined[data-icon="photo_camera"]')?.parentElement;
            
            if (shutterBtn) {
                shutterBtn.addEventListener('click', () => {
                    // Flash effect
                    const flash = document.createElement('div');
                    flash.className = 'fixed inset-0 bg-white z-[100] opacity-100 transition-opacity duration-500';
                    document.body.appendChild(flash);
                    
                    setTimeout(() => {
                        flash.style.opacity = '0';
                        setTimeout(() => flash.remove(), 500);
                    }, 50);

                    // Mock haptic response/visual feedback
                    console.log('Food captured. Analyzing...');
                });
            }
        });
    </script>
